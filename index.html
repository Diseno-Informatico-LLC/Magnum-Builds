<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Magnum — Software de gestión ERP</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%93%A6%3C/text%3E%3C/svg%3E">
  <style>
    :root {
      --bg: #0d1117;
      --panel: #161b22;
      --border: #30363d;
      --text: #c9d1d9;
      --muted: #8b949e;
      --accent: #58a6ff;
      --tag-bg: #1f6feb1a;
      --tag-fg: #58a6ff;
      --green: #238636;
      --green-hover: #2ea043;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    header {
      padding: 2.5rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
      text-align: center;
    }
    header h1 {
      margin: 0 0 .5rem;
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: -.02em;
    }
    header .site-link {
      color: var(--accent);
      text-decoration: none;
      font-size: 1rem;
    }
    header .site-link:hover { text-decoration: underline; }
    main {
      max-width: 920px;
      margin: 2rem auto;
      padding: 0 1.5rem;
    }
    .controls {
      display: flex;
      gap: .75rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .controls input {
      flex: 1;
      min-width: 200px;
      padding: .5rem .75rem;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: .95rem;
    }
    .controls input:focus {
      outline: none;
      border-color: var(--accent);
    }
    .controls .count {
      color: var(--muted);
      font-size: .85rem;
    }
    .release {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 1rem;
      overflow: hidden;
    }
    .release > summary {
      list-style: none;
      cursor: pointer;
      padding: 1rem 1.5rem;
      user-select: none;
      transition: background .15s;
    }
    .release > summary::-webkit-details-marker { display: none; }
    .release > summary:hover { background: rgba(255,255,255,.03); }
    .release[open] > summary { border-bottom: 1px solid var(--border); }
    .release-content {
      padding: 1rem 1.5rem 1.25rem;
    }
    .release-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .release-header > div:first-child {
      display: flex;
      align-items: center;
      gap: .6rem;
      flex-wrap: wrap;
    }
    .chevron {
      display: inline-block;
      color: var(--muted);
      font-size: .8rem;
      transition: transform .15s;
      width: 1rem;
    }
    .release[open] .chevron { transform: rotate(90deg); }
    .release h2 {
      margin: 0 0 .25rem;
      font-size: 1.1rem;
    }
    .release h2 a {
      color: var(--text);
      text-decoration: none;
    }
    .release h2 a:hover { color: var(--accent); }
    .tag {
      display: inline-block;
      padding: .15rem .5rem;
      background: var(--tag-bg);
      color: var(--tag-fg);
      border-radius: 99px;
      font-size: .75rem;
      font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
    }
    .meta {
      color: var(--muted);
      font-size: .85rem;
      margin-bottom: .75rem;
    }
    .body {
      color: var(--text);
      font-size: .9rem;
      background: rgba(255,255,255,.02);
      padding: .75rem 1rem;
      border-radius: 6px;
      border-left: 3px solid var(--accent);
      margin-bottom: 1rem;
      overflow-x: auto;
    }
    .body:empty { display: none; }
    .body p { margin: .5rem 0; }
    .body h1, .body h2, .body h3, .body h4 {
      margin: 1rem 0 .5rem;
      font-weight: 600;
    }
    .body h1 { font-size: 1.1rem; }
    .body h2 { font-size: 1.05rem; color: var(--accent); }
    .body h3 { font-size: .95rem; color: var(--accent); }
    .body h4 { font-size: .9rem; }
    .body ul, .body ol { padding-left: 1.5rem; margin: .5rem 0; }
    .body li { margin: .15rem 0; }
    .body a { color: var(--accent); text-decoration: none; }
    .body a:hover { text-decoration: underline; }
    .body code {
      font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
      font-size: .85em;
      background: rgba(110,118,129,.25);
      padding: .1em .35em;
      border-radius: 4px;
    }
    .body pre {
      background: rgba(0,0,0,.35);
      padding: .75rem;
      border-radius: 6px;
      overflow-x: auto;
    }
    .body pre code { background: none; padding: 0; }
    .body strong { color: #e6edf3; }
    .body hr { border: none; border-top: 1px solid var(--border); margin: 1rem 0; }
    .assets {
      display: flex;
      flex-wrap: wrap;
      gap: .5rem;
    }
    .asset {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      padding: .4rem .8rem;
      background: var(--green);
      color: white;
      text-decoration: none;
      border-radius: 6px;
      font-size: .85rem;
      transition: background .15s;
    }
    .asset:hover { background: var(--green-hover); }
    .asset .size {
      font-size: .75rem;
      opacity: .85;
    }
    .empty, .loading, .error {
      text-align: center;
      padding: 3rem 1.5rem;
      color: var(--muted);
    }
    .error { color: #f85149; }
    .latest-badge {
      background: #ffd33d33;
      color: #ffd33d;
      padding: .15rem .45rem;
      border-radius: 99px;
      font-size: .7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .04em;
      margin-left: .5rem;
    }
    .type-badge {
      display: inline-block;
      padding: .15rem .45rem;
      border-radius: 99px;
      font-size: .7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .04em;
      margin-left: .5rem;
    }
    .type-badge.api { background: #1f6feb33; color: #58a6ff; }
    .type-badge.frontend { background: #a371f733; color: #bc8cff; }
    .type-badge.updater { background: #2ea04333; color: #56d364; }
    .history-header {
      margin: 2.5rem 0 1rem;
      font-size: .8rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .08em;
    }
    .group {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: .75rem;
      overflow: hidden;
    }
    .group > summary {
      list-style: none;
      cursor: pointer;
      padding: .75rem 1.25rem;
      user-select: none;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: .5rem;
      transition: background .15s;
    }
    .group > summary::-webkit-details-marker { display: none; }
    .group > summary:hover { background: rgba(255,255,255,.03); }
    .group[open] > summary { border-bottom: 1px solid var(--border); }
    .group[open] > summary > .chevron { transform: rotate(90deg); }
    .group-content { padding: 1rem 1rem .25rem; }
    .group-year > summary { font-size: 1rem; }
    .group-month { margin-bottom: .5rem; border-radius: 6px; }
    .group-month > summary {
      font-size: .9rem;
      font-weight: 500;
      padding: .55rem 1rem;
      text-transform: capitalize;
    }
    .group .meta-count {
      color: var(--muted);
      font-weight: 400;
      font-size: .85rem;
      margin-left: .35rem;
    }
    footer {
      text-align: center;
      padding: 2rem 1.5rem;
      color: var(--muted);
      font-size: .8rem;
      border-top: 1px solid var(--border);
      margin-top: 3rem;
    }
    footer a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
  <header>
    <h1>Magnum, Software de gestión ERP</h1>
    <a class="site-link" href="https://www.gestionmagnum.com.ar" target="_blank" rel="noopener">www.gestionmagnum.com.ar</a>
  </header>

  <main>
    <div id="releases">
      <div class="loading">Cargando releases…</div>
    </div>
  </main>

  <footer>
    <p>Powered by GitHub Releases · <a href="https://github.com/Diseno-Informatico-LLC/Magnum-Builds/releases">Ver en GitHub</a></p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.9/dist/purify.min.js"></script>
  <script>
    const REPO = 'Diseno-Informatico-LLC/Magnum-Builds';
    const API = `https://api.github.com/repos/${REPO}/releases?per_page=100`;
    const $releases = document.getElementById('releases');

    marked.setOptions({ gfm: true, breaks: true });

    function fmtDate(iso) {
      const d = new Date(iso);
      return d.toLocaleString('es-AR', { dateStyle: 'medium', timeStyle: 'short' });
    }

    function fmtSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024**2) return (bytes/1024).toFixed(1) + ' KB';
      if (bytes < 1024**3) return (bytes/1024/1024).toFixed(1) + ' MB';
      return (bytes/1024/1024/1024).toFixed(2) + ' GB';
    }

    function escape(s) {
      return s.replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
    }

    function renderMarkdown(md) {
      if (!md) return '';
      const html = marked.parse(md);
      return DOMPurify.sanitize(html, { ADD_ATTR: ['target', 'rel'] });
    }

    let releases = [];

    function hydrate(details) {
      const body = details.querySelector('.body[data-pending]');
      if (!body) return;
      const idx = +details.dataset.idx;
      body.innerHTML = renderMarkdown(releases[idx].body);
      body.removeAttribute('data-pending');
    }

    function tipoRelease(r) {
      const tag = (r.tag_name || '').toLowerCase();
      if (tag.startsWith('frontend-')) return 'frontend';
      if (tag.startsWith('updater-')) return 'updater';
      return 'api';
    }

    const TIPO_LABEL = { api: 'API', frontend: 'Frontend', updater: 'Updater' };

    function renderRelease(r, i, isLatest) {
      const tipo = tipoRelease(r);
      const assets = (r.assets || []).map(a =>
        `<a class="asset" href="${a.browser_download_url}" download>
          ⬇ ${escape(a.name)}
          <span class="size">${fmtSize(a.size)}</span>
        </a>`
      ).join('');
      const body = r.body ? `<div class="body" data-pending="1"></div>` : '';
      return `
        <details class="release" data-idx="${i}"${isLatest ? ' open' : ''}>
          <summary>
            <div class="release-header">
              <div>
                <span class="chevron">▶</span>
                <h2>${escape(r.name || r.tag_name)}<span class="type-badge ${tipo}">${TIPO_LABEL[tipo]}</span>${isLatest ? '<span class="latest-badge">Latest</span>' : ''}</h2>
                <span class="tag">${escape(r.tag_name)}</span>
              </div>
              <div class="meta">${fmtDate(r.published_at)}</div>
            </div>
          </summary>
          <div class="release-content">
            ${body}
            <div class="assets">${assets || '<span class="meta">Sin archivos adjuntos.</span>'}</div>
          </div>
        </details>`;
    }

    function render(list) {
      if (!list.length) {
        $releases.innerHTML = '<div class="empty">No hay releases publicadas todavía.</div>';
        return;
      }

      // Latest de cada tipo (API, Frontend, Updater) al principio, expandido.
      const seen = new Set();
      const latests = [];
      const rest = [];
      list.forEach(r => {
        const t = tipoRelease(r);
        if (!seen.has(t)) { seen.add(t); latests.push(r); }
        else { rest.push(r); }
      });
      releases = [...latests, ...rest];
      const latestCount = latests.length;

      const latestsHtml = releases
        .slice(0, latestCount)
        .map((r, i) => renderRelease(r, i, true))
        .join('');

      // Agrupar las viejas por año → mes, colapsadas.
      const groups = {};
      for (let i = latestCount; i < releases.length; i++) {
        const d = new Date(releases[i].published_at);
        const y = d.getFullYear();
        const m = d.getMonth();
        (groups[y] = groups[y] || {});
        (groups[y][m] = groups[y][m] || []).push(i);
      }

      const years = Object.keys(groups).map(Number).sort((a, b) => b - a);
      const oldHtml = years.map(y => {
        const months = Object.keys(groups[y]).map(Number).sort((a, b) => b - a);
        const yearCount = months.reduce((s, m) => s + groups[y][m].length, 0);
        const monthsHtml = months.map(m => {
          const monthName = new Date(y, m, 1).toLocaleDateString('es-AR', { month: 'long' });
          const items = groups[y][m].map(i => renderRelease(releases[i], i, false)).join('');
          return `<details class="group group-month">
            <summary><span class="chevron">▶</span>${monthName}<span class="meta-count">(${groups[y][m].length})</span></summary>
            <div class="group-content">${items}</div>
          </details>`;
        }).join('');
        return `<details class="group group-year">
          <summary><span class="chevron">▶</span>${y}<span class="meta-count">(${yearCount})</span></summary>
          <div class="group-content">${monthsHtml}</div>
        </details>`;
      }).join('');

      $releases.innerHTML = latestsHtml
        + (oldHtml ? `<div class="history-header">Historial</div>${oldHtml}` : '');

      $releases.querySelectorAll('details.release').forEach(d => {
        if (d.open) hydrate(d);
        d.addEventListener('toggle', () => { if (d.open) hydrate(d); });
      });
    }

    fetch(API)
      .then(r => {
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        return r.json();
      })
      .then(data => render(data))
      .catch(err => {
        $releases.innerHTML = `<div class="error">Error cargando releases: ${escape(err.message)}<br><small>Si el repo es privado, la API requiere autenticación.</small></div>`;
      });
  </script>
</body>
</html>
